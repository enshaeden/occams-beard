<section class="card stack-sm">
  <div class="section-heading">
    <div>
      <p class="eyebrow">Warnings</p>
      <h2>Unsupported and Degraded Checks</h2>
    </div>
  </div>

  {% if result.warnings %}
    <ul class="warning-list">
      {% for warning in result.warnings %}
        <li>
          <strong>[{{ warning.domain }}:{{ warning.code }}]</strong>
          <span>{{ warning.message }}</span>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="muted">No degraded or unsupported checks were reported for this run.</p>
  {% endif %}
</section>
